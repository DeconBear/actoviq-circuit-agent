<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actoviq Circuit Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    :root {
      color-scheme: light;
      --ui-bg: #f3f5f7;
      --ui-panel: #ffffff;
      --ui-panel-muted: #f7f8fa;
      --ui-border: #dfe3e8;
      --ui-border-strong: #c8cfd7;
      --ui-text: #28313b;
      --ui-text-muted: #69727d;
      --ui-text-soft: #8a929d;
      --ui-accent: #2563eb;
      --ui-accent-soft: #eaf2ff;
      --ui-success: #267346;
      --ui-danger: #a32d38;
      --ui-warning: #a26108;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--ui-bg);
      color: var(--ui-text);
    }
    @keyframes actoviq-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes actoviq-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    /* Markdown content styles */
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      color: var(--ui-accent);
      margin: 16px 0 8px;
    }
    .markdown-content h1 { font-size: 1.5em; }
    .markdown-content h2 { font-size: 1.25em; }
    .markdown-content h3 { font-size: 1.1em; }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { padding-left: 24px; margin: 8px 0; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: #eef1f4;
      color: #34404c;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9em;
    }
    .markdown-content pre {
      background: #f8fafc;
      border: 1px solid var(--ui-border);
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .markdown-content pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }
    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }
    .markdown-content th, .markdown-content td {
      border: 1px solid var(--ui-border);
      padding: 6px 12px;
      text-align: left;
      font-size: 0.9em;
    }
    .markdown-content th {
      background: #eef1f4;
      color: var(--ui-text-muted);
      font-weight: 600;
    }
    .markdown-content blockquote {
      border-left: 3px solid var(--ui-accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--ui-text-muted);
    }
    .markdown-content a { color: var(--ui-accent); }
    .markdown-content hr { border: none; border-top: 1px solid var(--ui-border); margin: 16px 0; }
    .netlist-notebook-preview > * {
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
    }
    .netlist-notebook-preview pre {
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(32, 42, 56, 0.08);
    }
    .netlist-notebook-preview .netlist-code-block {
      position: relative;
    }
    .netlist-notebook-preview .code-lang {
      position: absolute;
      right: 12px;
      top: 8px;
      color: var(--ui-text-soft);
      font-size: 10px;
      text-transform: uppercase;
    }
    /* Compact chat-specific markdown */
    .chat-markdown p { margin: 4px 0; }
    .chat-markdown ul, .chat-markdown ol { margin: 4px 0; }
    .chat-markdown pre { margin: 8px 0; padding: 8px 12px; }
    .chat-markdown h1, .chat-markdown h2, .chat-markdown h3 { margin: 8px 0 4px; }
    .chat-markdown .code-block { position: relative; }
    .chat-markdown .code-lang {
      position: absolute;
      top: 0;
      right: 8px;
      font-size: 10px;
      color: var(--ui-text-soft);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
