<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actoviq Circuit Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    @keyframes actoviq-spin {
      to { transform: rotate(360deg); }
    }
    /* Markdown content styles */
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      color: #e94560;
      margin: 16px 0 8px;
    }
    .markdown-content h1 { font-size: 1.5em; }
    .markdown-content h2 { font-size: 1.25em; }
    .markdown-content h3 { font-size: 1.1em; }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { padding-left: 24px; margin: 8px 0; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: #1a1a2e;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.9em;
    }
    .markdown-content pre {
      background: #0d1117;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .markdown-content pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }
    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }
    .markdown-content th, .markdown-content td {
      border: 1px solid #0f3460;
      padding: 6px 12px;
      text-align: left;
      font-size: 0.9em;
    }
    .markdown-content th {
      background: #16213e;
      color: #808090;
      font-weight: 600;
    }
    .markdown-content blockquote {
      border-left: 3px solid #e94560;
      padding-left: 12px;
      margin: 8px 0;
      color: #8b949e;
    }
    .markdown-content a { color: #e94560; }
    .markdown-content hr { border: none; border-top: 1px solid #0f3460; margin: 16px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
